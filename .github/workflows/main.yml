name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: |
          # الدخول لأعمق نقطة في المجلدات للوصول للكود
          cd SecretVault-Android/SecretVault-Android 
          
          # إنشاء ملفات الإعدادات آلياً
          echo "include ':app'" > settings.gradle
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: App-Package
          path: "**/*.apk"
     with:
          name: FinalApp
          path: "**/*.apk"
