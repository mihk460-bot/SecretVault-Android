name: Emergency Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android Build Tools
        run: |
          # البحث عن المجلد الذي يحتوي على كود src الفعلي
          PROJECT_PATH=$(find . -name "src" -type d -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_PATH" ]; then PROJECT_PATH="."; fi
          cd "$PROJECT_PATH"
          
          # إنشاء ملفات النظام المفقودة بالقوة
          echo "include ':app'" > settings.gradle
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          
          # محاولة البناء مع تجاهل الأخطاء البسيطة
          ./gradlew assembleDebug --stacktrace
          
      - name: Export APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-App
          path: "**/*.apk"
