name: Final Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Build
        run: |
          # 1. البحث عن أي مجلد يحتوي على كود برمج جافا أو كوتلن
          ROOT_DIR=$(find . -name "src" -type d -exec dirname {} \; | head -n 1)
          if [ -z "$ROOT_DIR" ]; then ROOT_DIR="."; fi
          cd "$ROOT_DIR"
          
          # 2. صناعة ملفات النظام يدوياً لتجاوز أي نقص
          echo "include ':app'" > settings.gradle
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          
          # 3. تحديث الجرادل بالقوة
          gradle wrapper --gradle-version 8.2.2
          chmod +x gradlew
          
          # 4. بناء التطبيق مع تجاهل الأخطاء غير القاتلة
          ./gradlew assembleDebug --no-daemon

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: FinalApp
          path: "**/*.apk"
