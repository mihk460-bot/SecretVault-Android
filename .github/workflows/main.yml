name: Build APK
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Auto-Repair Project Structure
        run: |
          # 1. البحث عن المجلد الذي يحتوي على الكود الفعلي (java أو kotlin)
          APP_DIR=$(find . -name "src" -type d -exec dirname {} \; | head -n 1)
          if [ -z "$APP_DIR" ]; then APP_DIR="./app"; fi
          echo "تم تحديد مجلد التطبيق: $APP_DIR"

          # 2. إنشاء ملف settings.gradle في الجذر إذا كان ناقصاً
          if [ ! -f "settings.gradle" ]; then
            echo "include ':app'" > settings.gradle
            echo "rootProject.name='SecretVault'" >> settings.gradle
          fi

          # 3. إصلاح ملف build.gradle الرئيسي (إضافة الإصدارات الناقصة)
          cat <<EOT > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOT

          # 4. إصلاح ملف app/build.gradle للتأكد من وجود الإصدارات
          if [ -f "$APP_DIR/build.gradle" ]; then
            sed -i 's/id .com.android.application./id "com.android.application" version "8.2.2" apply false/g' "$APP_DIR/build.gradle"
          fi

      - name: Generate Wrapper and Build
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          path: "**/build/outputs/apk/debug/app-debug.apk"
