name: Debug Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Hard Reset and Build
        run: |
          # البحث عن المجلد الذي يحتوي على src
          ROOT=$(find . -name "src" -type d -exec dirname {} \; | head -n 1)
          cd "$ROOT"
          
          # حذف أي إعدادات قديمة وصناعة إعدادات جديدة
          rm -f settings.gradle
          echo "include ':app'" > settings.gradle
          
          # تحميل الجرادل وبدء البناء مع إظهار التفاصيل المملة للأخطاء
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info
