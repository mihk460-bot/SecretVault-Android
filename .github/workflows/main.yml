name: Build APK
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Find and Build APK
        run: |
          # البحث عن المجلد الذي يحتوي على ملف build.gradle
          PROJECT_ROOT=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
          echo "تم العثور على المشروع في: $PROJECT_ROOT"
          cd "$PROJECT_ROOT"
          
          # إنشاء ملفات الجرادل إذا كانت ناقصة
          gradle wrapper
          chmod +x gradlew
          
          # بدء عملية بناء التطبيق
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          # البحث عن ملف الـ APK الناتج ورفعه
          path: "**/build/outputs/apk/debug/app-debug.apk"
