name: Ultimate Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          # الدخول إلى المجلد الذي يحتوي على الكود
          cd SecretVault-Android
          
          # إنشاء ملف settings.gradle لربط المكونات
          echo "include ':app'" > settings.gradle
          
          # إنشاء ملفات الجرادل الأساسية
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          
          # محاولة بناء التطبيق وتجاهل التحذيرات غير القاتلة
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SecretVault-App
          path: "**/build/outputs/apk/debug/*.apk"
        with:
          name: FinalApp
          path: "**/*.apk"
