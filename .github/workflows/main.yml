name: Build APK
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build App
        run: |
          if [ ! -f "settings.gradle" ]; then echo "include ':app'" > settings.gradle; fi
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-bundle
          path: "**/*.apk"

          # 4. إصلاح ملف app/build.gradle للتأكد من وجود الإصدارات
          if [ -f "$APP_DIR/build.gradle" ]; then
            sed -i 's/id .com.android.application./id "com.android.application" version "8.2.2" apply false/g' "$APP_DIR/build.gradle"
          fi

      - name: Generate Wrapper and Build
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          path: "**/build/outputs/apk/debug/app-debug.apk"
